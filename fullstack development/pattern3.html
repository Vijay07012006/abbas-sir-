<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>patter3</title>
    <script>
        function fun(){
            //alert("ok")
            let a = /^[a-zA-z ]{2,30}$/
            let name = document.getElementById('name').value
           // console.log(name);
            if(a.test(name)==true){
                //alert("valid name")
                document.getElementById('name').style.border="2px solid green"

            }else{
                //alert("invaid name")
                document.getElementById('name').style.border="3px solid red"

                let c = document.getElementById("errn").innerHTML="Invalid name"
            }
        }

    </script>
</head>
<body>
    Enter Name:
    <input type="text" name="" id="name">
    <span id="errn"></span>
    <br>
    <input type="submit" onclick="fun()">
</body>
</html>
