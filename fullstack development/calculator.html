<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Calculator</title>
    <script>
        function ch(){
           // alert("hello")
           let n1 = document.getElementById("n1").value;
           //alert(n1)
           let n2 = document.getElementById("n2").value;
           //alert(n2)
           let c = parseFloat(n1)+parseFloat(n2);
        //    document.getElementById('res').innerHTML = "Result:"+c
            document.getElementById("n3").value ="result:"+c
        }

    </script>
</head>
<body>
    Enter First Name:
    <input type="number" id="n1" >
    <br>
    Enter Second Name:
    <input type="number" id="n2" >
    <br>
    <input type="button" onclick="ch()" value="Add">
    <br>
    <input type="button" id="n3" readonly>
   <!-- -<h1 id="res">Result</h1> -->
</body>
</html>
