<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hollow X Pattern</title>
</head>
<body>

<pre id="out" style="font-size: 30px;"></pre>

<script>
    let n = 5;
    let result = "";

    for (let i = 1; i <= n; i++) {
        let row = "";

        for (let j = 1; j <= n; j++) {
            if (i == j || i + j == n + 1) {
                row += "*";
            } else {
                row += " ";
            }
        }
        result += row + "\n";
    }

    document.getElementById("out").textContent = result;
</script>

</body>
</html>
